<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mon Site</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0d0d0d;
      color:white;
      font-family:Arial, Helvetica, sans-serif;

      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      text-align:center;
      padding:20px;
    }

    img{
      width:220px;
      border-radius:12px;
      margin-bottom:25px;

      box-shadow:0 0 25px rgba(255,255,255,0.08);
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      color:#999;
      margin-bottom:30px;
      font-size:18px;
    }

    a{
      display:inline-block;
      padding:14px 28px;

      background:white;
      color:black;

      text-decoration:none;
      border-radius:10px;

      font-weight:bold;

      transition:0.3s;
    }

    a:hover{
      background:#222;
      color:white;
      border:1px solid white;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- IMAGE -->
    <img src="image.jpg" alt="Image">

    <!-- TEXTE -->
    <h1>miralabs.tech</h1>

    <p>Site en construction.</p>

    <!-- BOUTON -->
    <a href="https://github.com/tonpseudo" target="_blank">
      GitHub
    </a>

  </div>

</body>
</html>
